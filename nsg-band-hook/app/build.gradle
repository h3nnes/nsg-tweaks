plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nsgmod.band'
    compileSdk 36

    defaultConfig {
        applicationId 'com.nsgmod.band'
        minSdk 23
        targetSdk 36
        versionCode 33
        versionName "7.5"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError false
    }

    buildFeatures {
        buildConfig = false
    }
}

dependencies {
    compileOnly fileTree(dir: '../libs', include: ['*.jar'])
    compileOnly 'androidx.annotation:annotation:1.9.1'
    compileOnly 'androidx.preference:preference:1.2.1'
}
